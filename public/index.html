<!DOCTYPE html>
<html lang="nl">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>MediaSeerr</title>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet"/>
        <style>
            *,*::before,*::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box
            }

            :root {
                --bg: #0b0e17;
                --surface: #141826;
                --surface-hover: #1c2138;
                --border: #232840;
                --text: #e4e6f0;
                --text-dim: #7a7f9a;
                --accent: #6366f1;
                --accent-glow: rgba(99,102,241,.25);
                --green: #22c55e;
                --green-glow: rgba(34,197,94,.15);
                --amber: #f59e0b;
                --amber-glow: rgba(245,158,11,.15);
                --red: #ef4444;
                --red-glow: rgba(239,68,68,.15);
                --blue: #3b82f6;
                --blue-glow: rgba(59,130,246,.15);
                --radius: 12px
            }

            body {
                font-family: 'DM Sans',sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh
            }

            .auth-wrapper {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px
            }

            .auth-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 40px;
                width: 100%;
                max-width: 400px;
                box-shadow: 0 24px 48px rgba(0,0,0,.3)
            }

            .auth-logo {
                font-family: 'Outfit',sans-serif;
                font-weight: 900;
                font-size: 28px;
                text-align: center;
                margin-bottom: 8px;
                background: linear-gradient(135deg,var(--accent),#a78bfa);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent
            }

            .auth-subtitle {
                text-align: center;
                color: var(--text-dim);
                font-size: 14px;
                margin-bottom: 28px
            }

            .auth-field {
                margin-bottom: 16px
            }

            .auth-field label {
                display: block;
                font-size: 13px;
                font-weight: 500;
                color: var(--text-dim);
                margin-bottom: 6px
            }

            .auth-field input {
                width: 100%;
                padding: 12px 16px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 10px;
                color: var(--text);
                font-size: 15px;
                outline: none
            }

            .auth-field input:focus {
                border-color: var(--accent)
            }

            .auth-btn {
                width: 100%;
                padding: 14px;
                border-radius: 10px;
                font: 700 15px/1 'DM Sans',sans-serif;
                border: none;
                cursor: pointer;
                margin-top: 8px
            }

            .auth-btn-primary {
                background: var(--accent);
                color: #fff
            }

            .auth-btn-primary:hover {
                filter: brightness(1.15)
            }

            .auth-btn:disabled {
                opacity: .5
            }

            .auth-error {
                background: var(--red-glow);
                color: var(--red);
                padding: 10px 14px;
                border-radius: 8px;
                font-size: 13px;
                margin-bottom: 16px;
                display: none
            }

            .auth-error.show {
                display: block
            }

            nav {
                position: sticky;
                top: 0;
                z-index: 100;
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 0 32px;
                height: 64px;
                background: rgba(11,14,23,.85);
                backdrop-filter: blur(16px);
                border-bottom: 1px solid var(--border)
            }

            .logo {
                font-family: 'Outfit',sans-serif;
                font-weight: 900;
                font-size: 22px;
                background: linear-gradient(135deg,var(--accent),#a78bfa);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                letter-spacing: -.5px
            }

            .nav-links {
                display: flex;
                gap: 4px;
                margin-left: 24px
            }

            .nav-links button {
                background: none;
                border: none;
                color: var(--text-dim);
                font: 500 14px/1 'DM Sans',sans-serif;
                padding: 8px 16px;
                border-radius: 8px;
                cursor: pointer;
                transition: all .2s
            }

            .nav-links button:hover,.nav-links button.active {
                color: var(--text);
                background: var(--surface)
            }

            .search-wrapper {
                margin-left: auto;
                position: relative;
                width: 280px
            }

            .search-wrapper input {
                width: 100%;
                padding: 10px 16px 10px 40px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                color: var(--text);
                font-size: 14px;
                outline: none
            }

            .search-wrapper input:focus {
                border-color: var(--accent)
            }

            .search-wrapper svg {
                position: absolute;
                left: 12px;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                height: 18px;
                stroke: var(--text-dim)
            }

            .nav-user {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-left: 12px;
                flex-shrink: 0
            }

            .nav-user-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: var(--accent-glow);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                font-weight: 700;
                color: var(--accent)
            }

            .nav-user-name {
                font-size: 13px;
                color: var(--text-dim);
                max-width: 100px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap
            }

            .btn-logout {
                background: none;
                border: 1px solid var(--border);
                color: var(--text-dim);
                font: 500 12px/1 'DM Sans',sans-serif;
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer
            }

            .btn-logout:hover {
                border-color: var(--red);
                color: var(--red)
            }

            main {
                max-width: 1200px;
                margin: 0 auto;
                padding: 32px 24px
            }

            .section-title {
                font-family: 'Outfit',sans-serif;
                font-weight: 700;
                font-size: 24px;
                margin-bottom: 20px;
                display: flex;
                align-items: center;
                gap: 10px
            }

            .section-title .badge {
                font-size: 12px;
                font-weight: 500;
                background: var(--accent-glow);
                color: var(--accent);
                padding: 4px 10px;
                border-radius: 20px
            }

            .sub-nav {
                display: flex;
                gap: 6px;
                margin-bottom: 24px;
                flex-wrap: wrap
            }

            .sub-nav button {
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--text-dim);
                font: 500 13px/1 'DM Sans',sans-serif;
                padding: 8px 18px;
                border-radius: 20px;
                cursor: pointer;
                white-space: nowrap
            }

            .sub-nav button:hover {
                border-color: var(--text-dim);
                color: var(--text)
            }

            .sub-nav button.active {
                background: var(--accent);
                border-color: var(--accent);
                color: #fff
            }

            .genre-bar {
                display: flex;
                gap: 8px;
                margin-bottom: 24px;
                overflow-x: auto;
                padding-bottom: 8px;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent
            }

            .genre-chip {
                background: var(--surface);
                border: 1px solid var(--border);
                color: var(--text-dim);
                font: 500 12px/1 'DM Sans',sans-serif;
                padding: 7px 14px;
                border-radius: 16px;
                cursor: pointer;
                white-space: nowrap;
                flex-shrink: 0
            }

            .genre-chip:hover {
                border-color: var(--text-dim);
                color: var(--text)
            }

            .genre-chip.active {
                background: var(--accent-glow);
                border-color: var(--accent);
                color: var(--accent)
            }

            .media-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
                gap: 20px
            }

            .card {
                background: var(--surface);
                border-radius: var(--radius);
                overflow: hidden;
                cursor: pointer;
                border: 1px solid transparent;
                transition: transform .25s,border-color .25s,box-shadow .25s;
                position: relative
            }

            .card:hover {
                transform: translateY(-4px);
                border-color: var(--accent);
                box-shadow: 0 12px 32px rgba(0,0,0,.4),0 0 0 1px var(--accent)
            }

            .card-poster {
                aspect-ratio: 2/3;
                width: 100%;
                object-fit: cover;
                display: block;
                background: var(--surface-hover)
            }

            .card-body {
                padding: 12px
            }

            .card-title {
                font-weight: 700;
                font-size: 14px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis
            }

            .card-meta {
                font-size: 12px;
                color: var(--text-dim);
                margin-top: 4px;
                display: flex;
                align-items: center;
                gap: 6px
            }

            .type-badge {
                font-size: 10px;
                text-transform: uppercase;
                font-weight: 700;
                padding: 2px 6px;
                border-radius: 4px;
                background: var(--accent-glow);
                color: var(--accent)
            }

            .type-badge.tv {
                background: var(--green-glow);
                color: var(--green)
            }

            .type-badge.person {
                background: var(--amber-glow);
                color: var(--amber)
            }

            .card-status {
                position: absolute;
                top: 8px;
                right: 8px;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                z-index: 2;
                backdrop-filter: blur(4px);
                box-shadow: 0 2px 8px rgba(0,0,0,.4)
            }

            .card-status-available {
                background: rgba(34,197,94,.9)
            }

            .card-status-sent,.card-status-downloading {
                background: rgba(245,158,11,.9)
            }

            .card-status-sending {
                background: rgba(59,130,246,.9)
            }

            .card-status-failed,.card-status-not_configured {
                background: rgba(239,68,68,.9)
            }

            .media-row {
                display: flex;
                gap: 16px;
                overflow-x: auto;
                padding-bottom: 12px;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent
            }

            .media-row .card {
                min-width: 170px;
                max-width: 170px;
                flex-shrink: 0
            }

            /* Load more button inside row */
            .row-load-more-wrap {
                display: flex;
                align-items: center;
                padding: 0 4px;
                flex-shrink: 0
            }

            .row-load-more-btn {
                padding: 10px 16px;
                border-radius: 10px;
                font: 600 13px/1 'DM Sans',sans-serif;
                border: 1px solid var(--border);
                background: var(--surface);
                color: var(--text);
                cursor: pointer;
                white-space: nowrap;
                transition: all .2s
            }

            .row-load-more-btn:hover {
                border-color: var(--accent);
                color: var(--accent)
            }

            .row-load-more-btn:disabled {
                opacity: .5;
                pointer-events: none
            }

            .row-header {
                display: flex;
                align-items: center;
                margin-bottom: 14px;
                margin-top: 32px
            }

            .row-header:first-child {
                margin-top: 0
            }

            .row-title {
                font-family: 'Outfit',sans-serif;
                font-weight: 700;
                font-size: 20px
            }

            .load-more-wrap {
                text-align: center;
                margin-top: 28px
            }

            .btn-load-more {
                padding: 10px 32px;
                border-radius: 10px;
                font: 600 14px/1 'DM Sans',sans-serif;
                border: 1px solid var(--border);
                background: var(--surface);
                color: var(--text);
                cursor: pointer
            }

            .btn-load-more:hover {
                border-color: var(--accent);
                color: var(--accent)
            }

            .modal-overlay {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 200;
                background: rgba(0,0,0,.7);
                backdrop-filter: blur(8px);
                align-items: center;
                justify-content: center
            }

            .modal-overlay.open {
                display: flex
            }

            .modal {
                background: var(--surface);
                border-radius: 16px;
                width: 90%;
                max-width: 720px;
                max-height: 85vh;
                overflow-y: auto;
                position: relative;
                border: 1px solid var(--border);
                box-shadow: 0 32px 64px rgba(0,0,0,.5)
            }

            .modal-backdrop-img {
                height: 260px;
                width: 100%;
                object-fit: cover;
                border-radius: 16px 16px 0 0;
                display: block;
                filter: brightness(.6)
            }

            .modal-content {
                padding: 24px 28px 28px;
                position: relative
            }

            .modal-poster {
                width: 120px;
                height: 180px;
                border-radius: 10px;
                object-fit: cover;
                border: 3px solid var(--surface);
                position: absolute;
                top: -90px;
                left: 28px;
                box-shadow: 0 8px 24px rgba(0,0,0,.5)
            }

            .modal-info {
                margin-left: 148px;
                margin-top: -80px;
                min-height: 110px
            }

            .modal-title {
                font-family: 'Outfit',sans-serif;
                font-weight: 700;
                font-size: 26px;
                line-height: 1.2
            }

            .modal-subtitle {
                color: var(--text-dim);
                font-size: 14px;
                margin-top: 4px
            }

            /* FIX: overview clear so it never overlaps the poster */
            .modal-overview {
                margin-top: 20px;
                font-size: 14px;
                line-height: 1.7;
                color: var(--text-dim);
                clear: left
            }

            .modal-actions {
                margin-top: 20px;
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                align-items: center
            }

            .btn {
                padding: 10px 24px;
                border-radius: 10px;
                font: 600 14px/1 'DM Sans',sans-serif;
                border: none;
                cursor: pointer;
                transition: all .2s
            }

            .btn-primary {
                background: var(--accent);
                color: #fff
            }

            .btn-primary:hover {
                filter: brightness(1.15)
            }

            .btn-primary:disabled {
                background: var(--surface-hover);
                color: var(--text-dim);
                cursor: default
            }

            .btn-outline {
                background: transparent;
                border: 1px solid var(--border);
                color: var(--text)
            }

            .btn-outline:hover {
                border-color: var(--text-dim)
            }

            .btn-sm {
                padding: 6px 14px;
                font-size: 12px;
                border-radius: 8px
            }

            .btn-danger {
                background: var(--red-glow);
                color: var(--red);
                border: 1px solid rgba(239,68,68,.3)
            }

            .btn-danger:hover {
                background: var(--red);
                color: #fff
            }

            .btn-retry {
                background: var(--amber-glow);
                color: var(--amber);
                border: 1px solid rgba(245,158,11,.3)
            }

            .btn-retry:hover {
                background: var(--amber);
                color: #fff
            }

            .modal-close {
                position: absolute;
                top: 16px;
                right: 16px;
                z-index: 10;
                background: rgba(0,0,0,.5);
                border: none;
                color: #fff;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                font-size: 20px;
                cursor: pointer;
                backdrop-filter: blur(4px)
            }

            .release-badge {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                background: var(--blue-glow);
                color: var(--blue);
                padding: 6px 12px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: 600;
                margin-top: 10px
            }

            .trailer-section {
                margin-top: 20px
            }

            .trailer-toggle {
                display: flex;
                align-items: center;
                gap: 8px;
                background: none;
                border: 1px solid var(--border);
                color: var(--text);
                padding: 10px 18px;
                border-radius: 10px;
                font: 600 14px/1 'DM Sans',sans-serif;
                cursor: pointer;
                transition: all .2s;
                width: 100%
            }

            .trailer-toggle:hover {
                border-color: var(--red);
                color: var(--red)
            }

            .trailer-toggle.open {
                border-color: var(--red);
                color: var(--red);
                border-radius: 10px 10px 0 0;
                border-bottom: none
            }

            .trailer-container {
                border: 1px solid var(--border);
                border-top: none;
                border-radius: 0 0 10px 10px;
                overflow: hidden;
                background: #000
            }

            .trailer-container iframe {
                width: 100%;
                aspect-ratio: 16/9;
                display: block;
                border: none
            }

            .trailer-tabs {
                display: flex;
                gap: 0;
                background: var(--bg);
                border-bottom: 1px solid var(--border);
                overflow-x: auto
            }

            .trailer-tab {
                padding: 8px 16px;
                font: 500 12px/1 'DM Sans',sans-serif;
                color: var(--text-dim);
                background: none;
                border: none;
                cursor: pointer;
                white-space: nowrap;
                border-bottom: 2px solid transparent;
                transition: all .2s
            }

            .trailer-tab:hover {
                color: var(--text)
            }

            .trailer-tab.active {
                color: var(--red);
                border-bottom-color: var(--red)
            }

            .cast-section {
                margin-top: 20px
            }

            .cast-title {
                font-family: 'Outfit',sans-serif;
                font-weight: 700;
                font-size: 16px;
                margin-bottom: 12px
            }

            .cast-scroll {
                display: flex;
                gap: 12px;
                overflow-x: auto;
                padding-bottom: 8px;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent
            }

            .cast-scroll::-webkit-scrollbar {
                height: 4px
            }

            .cast-scroll::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 4px
            }

            .cast-item {
                flex-shrink: 0;
                width: 90px;
                text-align: center;
                cursor: pointer;
                transition: transform .2s
            }

            .cast-item:hover {
                transform: translateY(-2px)
            }

            .cast-photo {
                width: 72px;
                height: 72px;
                border-radius: 50%;
                object-fit: cover;
                margin: 0 auto 6px;
                display: block;
                background: var(--surface-hover);
                border: 2px solid var(--border);
                transition: border-color .2s
            }

            .cast-item:hover .cast-photo {
                border-color: var(--accent)
            }

            .cast-photo-placeholder {
                width: 72px;
                height: 72px;
                border-radius: 50%;
                margin: 0 auto 6px;
                background: var(--surface-hover);
                border: 2px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
                color: var(--text-dim)
            }

            .cast-name {
                font-size: 12px;
                font-weight: 600;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis
            }

            .cast-char {
                font-size: 11px;
                color: var(--text-dim);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis
            }

            .status {
                font-size: 12px;
                font-weight: 600;
                padding: 4px 10px;
                border-radius: 6px;
                display: inline-flex;
                align-items: center;
                gap: 5px
            }

            .status-sending {
                background: var(--blue-glow);
                color: var(--blue)
            }

            .status-sent {
                background: var(--accent-glow);
                color: var(--accent)
            }

            .status-downloading {
                background: var(--amber-glow);
                color: var(--amber)
            }

            .status-available {
                background: var(--green-glow);
                color: var(--green)
            }

            .status-failed {
                background: var(--red-glow);
                color: var(--red)
            }

            .status-not_configured {
                background: var(--red-glow);
                color: var(--red)
            }

            .status-msg {
                font-size: 12px;
                color: var(--text-dim);
                margin-top: 4px;
                max-width: 400px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap
            }

            .season-picker {
                margin-top: 16px;
                padding: 16px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 10px
            }

            .season-picker-title {
                font-weight: 700;
                font-size: 14px;
                margin-bottom: 10px;
                display: flex;
                align-items: center;
                justify-content: space-between
            }

            .season-picker-title button {
                font-size: 12px;
                color: var(--accent);
                background: none;
                border: none;
                cursor: pointer;
                font-family: 'DM Sans',sans-serif
            }

            .season-picker-title button:hover {
                text-decoration: underline
            }

            .season-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 8px
            }

            .season-chip {
                padding: 8px 14px;
                border-radius: 8px;
                font-size: 13px;
                font-weight: 600;
                border: 1px solid var(--border);
                background: var(--surface);
                color: var(--text-dim);
                cursor: pointer;
                user-select: none
            }

            .season-chip:hover {
                border-color: var(--accent);
                color: var(--text)
            }

            .season-chip.selected {
                background: var(--accent);
                border-color: var(--accent);
                color: #fff
            }

            .person-card {
                background: var(--surface);
                border-radius: var(--radius);
                overflow: hidden;
                cursor: pointer;
                border: 1px solid transparent;
                transition: transform .25s,border-color .25s
            }

            .person-card:hover {
                transform: translateY(-4px);
                border-color: var(--amber);
                box-shadow: 0 12px 32px rgba(0,0,0,.4)
            }

            .person-photo {
                aspect-ratio: 2/3;
                width: 100%;
                object-fit: cover;
                display: block;
                background: var(--surface-hover)
            }

            .person-body {
                padding: 12px
            }

            .person-name {
                font-weight: 700;
                font-size: 14px;
                white-space: nowrap;
                overflow: hidden;

            .req-meta {

            }

            .req-actions {
                display: flex;

            }

            .req-user {
                font-size: 11px;

            }

            .settings-page {
                max-width: 720px
            }

            .settings-group {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 24px;

            }

            .settings-group-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 18px
            }

            .settings-group-title {
                font-family: 'Outfit',sans-serif;
                font-weight: 700;
                font-size: 18px;
                display: flex;
                align-items: center;
                gap: 10px
            }

            .settings-group-title .icon {
                width: 36px;
                height: 36px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px
            }

            .icon-tmdb { background: rgba(1,180,228,.15) }
            .icon-radarr { background: rgba(255,165,0,.15) }
            .icon-sonarr { background: rgba(52,152,219,.15) }
            .icon-jellyfin { background: rgba(0,164,220,.15) }
            .icon-plex { background: rgba(229,160,13,.15) }
            .icon-users { background: rgba(99,102,241,.15) }

            .form-row { margin-bottom: 14px }
            .form-row:last-child { margin-bottom: 0 }

            .form-label {
                display: block;
                font-size: 13px;
                font-weight: 500;
                color: var(--text-dim);

            }

            .form-input,.form-select {
                width: 100%;
                padding: 10px 14px;
                background: var(--bg);
                border: 1px solid var(--border);

                font-size: 14px;
                font-family: 'DM Sans',sans-serif;
                outline: none
            }

            .form-input:focus,.form-select:focus { border-color: var(--accent) }
            .form-input::placeholder { color: var(--text-dim); opacity: .5 }

            .form-hint {
                font-size: 12px;

            }

            .btn-test {
                padding: 8px 16px;
                border-radius: 8px;

            }

            .btn-test:hover { border-color: var(--accent); color: var(--accent) }
            .btn-test.testing { opacity: .5; pointer-events: none }
            .btn-test.success { border-color: var(--green); color: var(--green); background: var(--green-glow) }
            .btn-test.fail { border-color: var(--red); color: var(--red); background: var(--red-glow) }

            .settings-footer {

            .save-status {

            }

            .save-status.visible { opacity: 1 }

            .user-row {
                display: flex;
                align-items: center;

            }

            .user-row:last-child { border-bottom: none }

            .user-avatar {
                width: 36px;

            }

            .user-info { flex: 1 }
            .user-info strong { font-size: 14px }
            .user-info span { font-size: 12px; color: var(--text-dim); margin-left: 8px }

            .user-role {
                font-size: 11px;
                padding: 3px 8px;
                border-radius: 4px;
                font-weight: 600
            }

            .user-role-admin { background: var(--accent-glow); color: var(--accent) }
            .user-role-user { background: var(--surface-hover); color: var(--text-dim) }

            .add-user-form {
                display: flex;
                gap: 8px;
                margin-top: 16px;
                flex-wrap: wrap
            }

            .add-user-form input,.add-user-form select {
                padding: 8px 12px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 8px;

                font-size: 13px;
                outline: none
            }

            .add-user-form input:focus,.add-user-form select:focus { border-color: var(--accent) }

            .empty-state {
                text-align: center;
                padding: 80px 20px;
