version: "3.8"
services:
  mediaseerr:
    build: .
    container_name: mediaseerr
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - ./config:/app/config
    environment:
      - PORT=5055
    networks:
      - mediaseerr-net
networks:
  mediaseerr-net:
    driver: bridge
