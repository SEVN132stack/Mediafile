version: "3.8"

services:
  mediaseerr:
    build: .
    container_name: mediaseerr
    restart: unless-stopped
    ports:
      - "5055:5055"
    volumes:
      - ./config:/app/config
    environment:
      # --- Verplicht ---
      - TMDB_API_KEY=${TMDB_API_KEY}

      # --- Mediaserver (kies Jellyfin of Plex) ---
      - JELLYFIN_URL=${JELLYFIN_URL:-}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - PLEX_URL=${PLEX_URL:-}
      - PLEX_TOKEN=${PLEX_TOKEN:-}

      # --- Download clients ---
      - RADARR_URL=${RADARR_URL:-}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - SONARR_URL=${SONARR_URL:-}
      - SONARR_API_KEY=${SONARR_API_KEY:-}

      # --- Overig ---
      - LOG_LEVEL=info
      - PORT=5055
    networks:
      - mediaseerr-net

networks:
  mediaseerr-net:
    driver: bridge
