version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mediaseerr
    restart: unless-stopped
    expose:
      - "9000"
    volumes:
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    networks:
      - mediaseerr-net
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: mediaseerr-nginx
    restart: unless-stopped
    ports:
      - "8096:80"
    volumes:
      - ./public:/var/www/html/public
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mediaseerr-net
    depends_on:
      - app

  redis:
    image: redis:alpine
    container_name: mediaseerr-redis
    restart: unless-stopped
    networks:
      - mediaseerr-net

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mediaseerr-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php /var/www/html/artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - QUEUE_CONNECTION=redis
      - REDIS_HOST=redis
    networks:
      - mediaseerr-net
    depends_on:
      - redis

  watchtower:
    image: containrrr/watchtower:1.4.0
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - WATCHTOWER_CLEANUP=true
      - TZ=Europe/Amsterdam
    networks:
      - mediaseerr-net

networks:
  mediaseerr-net:
    driver: bridge
